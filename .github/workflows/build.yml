name: Build Quill

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate version resource
        run: |
          cd cmd/quill
          goversioninfo -o resource_windows.syso

      - name: Build exe
        run: |
          go build -ldflags="-H windowsgui -s -w" -o quill.exe ./cmd/quill
          dir quill.exe

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: quill-exe
          path: quill.exe
          retention-days: 30

  release:
    name: Publish Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: needs.build-windows.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: quill-exe

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.1.0
          name: Quill v1.1.0
          make_latest: true
          body: |
            ## Quill v1.1.0

            Offline voice dictation for Windows.

            ### Install
            1. Download **quill.exe** (5MB)
            2. Put it anywhere and run it
            3. First launch downloads the speech engine automatically (~150MB, one time)
            4. Hold **Ctrl+Alt**, speak, release

            No installer. No zip. No extra downloads. One file.
          files: quill.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
