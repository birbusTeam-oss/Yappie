name: Build Quill

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate version resource
        run: |
          cd cmd/quill
          goversioninfo -o resource_windows.syso

      - name: Build exe
        run: |
          go build -ldflags="-H windowsgui -s -w" -o quill.exe ./cmd/quill
          dir quill.exe

      - name: Download whisper.cpp
        shell: pwsh
        run: |
          mkdir whisper
          Invoke-WebRequest -Uri "https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.4/whisper-bin-x64.zip" -OutFile whisper-bin.zip
          Expand-Archive whisper-bin.zip -DestinationPath whisper-extract
          Copy-Item whisper-extract/Release/whisper-cli.exe whisper/
          Copy-Item whisper-extract/Release/ggml-base.dll whisper/
          Copy-Item whisper-extract/Release/ggml-cpu.dll whisper/
          Copy-Item whisper-extract/Release/ggml.dll whisper/
          Copy-Item whisper-extract/Release/whisper.dll whisper/

      - name: Download whisper model
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin" -OutFile whisper/ggml-base.en.bin

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Quill-Setup
          path: Quill-Setup.exe
          retention-days: 30

  release:
    name: Publish Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: needs.build-windows.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Quill-Setup

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.2
          name: Quill v1.0.2
          make_latest: true
          body: |
            ## Quill v1.0.0

            Offline voice dictation for Windows. Hold Ctrl+Alt, speak, text appears.

            **100% offline. Zero cloud. Zero API keys. One installer.**

            ### Download & Install
            1. Download **Quill-Setup.exe** below
            2. Run the installer
            3. Hold **Ctrl+Alt** to dictate

            Everything included — Quill + whisper engine + English model.
            No extra downloads needed.
          files: Quill-Setup.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
